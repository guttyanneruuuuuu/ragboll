<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0010"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#aaa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- crossed swords -->
  <g transform="translate(256 256) rotate(45)">
    <rect x="-8" y="-180" width="16" height="280" fill="url(#blade)"/>
    <rect x="-40" y="100" width="80" height="14" fill="#c0a060"/>
    <rect x="-10" y="100" width="20" height="60" fill="#5a3a20"/>
  </g>
  <g transform="translate(256 256) rotate(-45)">
    <rect x="-8" y="-180" width="16" height="280" fill="url(#blade)"/>
    <rect x="-40" y="100" width="80" height="14" fill="#c0a060"/>
    <rect x="-10" y="100" width="20" height="60" fill="#5a3a20"/>
  </g>
  <!-- spark -->
  <circle cx="256" cy="256" r="20" fill="#ff3344"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#ff3344" stroke-width="4" opacity="0.5"/>
</svg>
